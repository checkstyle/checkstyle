abbreviation.as.word=Аббревиатура в имени ''{0}'' должна содержать не более ''{1}'' последовательных заглавных букв.
google.method.name.character.usage=Имя метода ''{0}'' должно содержать только буквы, цифры и символы подчеркивания.
google.method.name.format.regular=Имя метода ''{0}'' должно состоять из нескольких символов, начинаться с маленькой буквы и не содержать ни одной строчной буквы, за которой следует прописная буква.
google.method.name.format.test=Сегмент имени тестового метода ''{0}'' должен состоять из более чем одного символа, начинаться с маленькой буквы и не содержать ни одной строчной буквы, за которой следует прописная буква.
google.method.name.underscore.regular=Имя метода ''{0}'' содержит недопустимое использование подчеркивания; подчеркивание разрешено только между соседними цифрами.
google.method.name.underscore.test=Имя тестового метода ''{0}'' содержит недопустимое использование подчеркивания; подчеркивание разрешено только между буквами или между цифрами.
google.non.constant.field.name.format=Имя неконстантного поля ''{0}'' должно начинаться со строчной буквы, иметь длину не менее 2 символов, не содержать одну строчную букву, за которой следует заглавная, и содержать только буквы, цифры или подчеркивания, при этом подчеркивания допустимы только между соседними цифрами.
illegal.abstract.class.name=Имя ''{0}'' должно соответствовать шаблону ''{1}''.
method.name.equals.class.name=Имя метода ''{0}'' не может совпадать с именем окружающего класса.
name.invalidPattern=Имя ''{0}'' должно соответствовать шаблону ''{1}''.
no.abstract.class.modifier=Класс ''{0}'' должен быть объявлен как ''abstract''.
