version: v1.0
name: "Checkstyle CI pipeline on Semaphore"
agent:
  machine:
    type: e1-standard-2
    os_image: ubuntu2404
auto_cancel:
  running:
    when: "branch != 'master'"
blocks:
  - name: "Linux openjdk build"
    task:
      prologue:
        commands:
          - checkout
          - cache restore m2
          - eval "export M2_CACHE_SIZE=$(du -s $HOME/.m2 | cut -f1)"
          - sudo apt-get update
          - sudo apt-get install -y ant xsltproc xmlstarlet
          - sudo apt-get install -y openjdk-21-jdk
          - export JAVA_HOME=/usr/lib/jvm/java-21-openjdk-amd64
          - export PATH=$JAVA_HOME/bin:$PATH
          - java -version
          - |
            for i in 1 2 3 4 5; do
                curl --fail-with-body -s "https://get.sdkman.io?ci=true" | bash && break \
                    || sleep 15s;
            done
          - source "$HOME/.sdkman/bin/sdkman-init.sh"
          - sdk install groovy
          - groovy --version
          - export GRADLE_OPTS=-Dorg.gradle.console=plain
      epilogue:
        commands:
          - |
            if [[ ${M2_CACHE_SIZE} -ne $(du -s $HOME/.m2 | cut -f1) ]]
            then
              cache delete m2
              cache store m2 $HOME/.m2
            fi
      jobs:
        - name: Validation (openjdk21, fast pool)
          matrix:
            - env_var: CMD
              values:
                - .ci/validation.sh eclipse-static-analysis
                # permanently disabled as it is very unstable in execution
                # - .ci/validation.sh nondex
          commands:
            - echo "eval of CMD is starting";
            - echo "CMD=$CMD";
            - eval $CMD;
            - echo "eval of CMD is completed";
            - ./.ci/validation.sh git-diff
