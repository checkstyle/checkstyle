type: specs.openrewrite.org/v1beta/recipe
name: org.checkstyle.StaticAnalysis
description: OpenRewrite standard fixes.
recipeList:
  # ###
  # composite list org.openrewrite.staticanalysis.CodeCleanup
  # https://docs.openrewrite.org/recipes/staticanalysis/codecleanup
  # ###
  # Kept excluded: OpenRewrite's DefaultComesLast always moves default to
  # the end of a switch statement, ignoring Checkstyle's
  # DefaultComesLastCheck option `skipIfLastAndSharedWithCase`. When set
  # to true, Checkstyle permits default to share a case group
  # (e.g. case 1: default: break;), which OpenRewrite would incorrectly
  # reorder.
  # - org.openrewrite.staticanalysis.DefaultComesLast
  # Kept excluded: OpenRewrite's EmptyBlock removes blocks entirely,
  # which conflicts with Checkstyle's EmptyBlockCheck that requires
  # blocks to have statements or text. Automatic deletion is too aggressive.
  # - org.openrewrite.staticanalysis.EmptyBlock
  - org.openrewrite.java.format.EmptyNewlineAtEndOfFile
  # Kept excluded: OpenRewrite's ForLoopControlVariablePostfixOperators
  # always replaces pre-increment (++i) with post-increment (i++) in for
  # loop update clauses, but Checkstyle has no equivalent check for this.
  # Both forms are functionally identical in for loops, and some style
  # guides prefer pre-increment.
  - org.openrewrite.staticanalysis.ForLoopControlVariablePostfixOperators
  # Kept excluded: OpenRewrite's FinalizePrivateFields automatically adds
  # final to private instance fields, but Checkstyle has no equivalent
  # check for private fields (FinalLocalVariable only covers local
  # variables). Adding final to fields can break frameworks that mutate
  # fields via reflection such as Spring, Hibernate, and Mockito.
  # - org.openrewrite.staticanalysis.FinalizePrivateFields
  # conflicts with MethodParamPadCheck in checkstyle_checks.xml
  # - org.openrewrite.java.format.MethodParamPad
  # conflicts with NoWhitespaceAfterCheck in checkstyle_checks.xml
  # - org.openrewrite.java.format.NoWhitespaceAfter
  # conflicts with NoWhitespaceBeforeCheck in checkstyle_checks.xml
  # - org.openrewrite.java.format.NoWhitespaceBefore
  - org.openrewrite.java.format.PadEmptyForLoopComponents
  # Kept excluded: OpenRewrite's TypecastParenPad always removes spaces around
  # typecast parentheses, while Checkstyle's TypecastParenPadCheck allows
  # configuration via the `option` property (`space` or `nospace`).
  # - org.openrewrite.staticanalysis.TypecastParenPad
  - org.openrewrite.staticanalysis.EqualsAvoidsNull
  # Kept excluded: OpenRewrite's ExplicitInitialization automatically removes
  # explicit initializations to default values (null, 0, false), while
  # Checkstyle's ExplicitInitializationCheck only reports violations,
  # allowing developers to decide whether to keep them for clarity.
  # Checkstyle also provides the `onlyObjectReferences` option to limit
  # checks to object references only.
  # - org.openrewrite.staticanalysis.ExplicitInitialization
  # Kept excluded: OpenRewrite's FallThrough always adds break statements,
  # ignoring Checkstyle's FallThroughCheck which allows configurable relief
  # comments via `reliefPattern` and can optionally skip checking the last
  # case group with `checkLastCaseGroup`
  # - org.openrewrite.staticanalysis.FallThrough
  - org.openrewrite.staticanalysis.HideUtilityClassConstructor
  # Kept excluded: OpenRewrite's NeedBraces always adds braces, overriding
  # Checkstyle's NeedBracesCheck which allows configuration for single-line
  # statements and empty loop bodies via `allowSingleLineStatement` and
  # `allowEmptyLoopBody` options.
  # - org.openrewrite.staticanalysis.NeedBraces
  # Kept excluded: OpenRewrite's OperatorWrap forces operators to the end of
  # the line with no configuration, while Checkstyle's OperatorWrapCheck
  # allows projects to choose between `nl` (new line) and `eol` (end of line)
  # via the `option` property, and can limit checks to specific tokens.
  # - org.openrewrite.staticanalysis.OperatorWrap
  - org.openrewrite.staticanalysis.UnnecessaryParentheses
  - org.openrewrite.staticanalysis.ReplaceThreadRunWithThreadStart
  - org.openrewrite.staticanalysis.ChainStringBuilderAppendCalls
  - org.openrewrite.staticanalysis.RemoveMethodsOnlyCallSuper
  - org.openrewrite.staticanalysis.ReplaceStringBuilderWithString
  - org.openrewrite.java.ShortenFullyQualifiedTypeReferences
  - org.openrewrite.java.SimplifySingleElementAnnotation
  # conflict with ImportOrder Check
  # - org.openrewrite.java.OrderImports
  - org.openrewrite.staticanalysis.RemoveUnusedLabels

  # ###
  # composite list org.openrewrite.staticanalysis.CommonStaticAnalysis
